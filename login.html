<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Bros Coaching Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="80" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="60" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="60" cy="30" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 100px 100px;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: inline-block;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .game-icon {
            font-size: 3em;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        label {
            position: absolute;
            top: 16px;
            left: 20px;
            color: #888;
            transition: all 0.3s ease;
            pointer-events: none;
            font-weight: 400;
            font-size: 16px;
        }

        input, select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 1);
        }

        input:focus + label, input:not(:placeholder-shown) + label,
        select:focus + label, select:not([value=""]) + label {
            top: -10px;
            left: 15px;
            font-size: 12px;
            color: #667eea;
            background: white;
            padding: 0 8px;
            font-weight: 500;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            accent-color: #667eea;
        }

        .checkbox-group label {
            position: static;
            pointer-events: auto;
            color: #555;
            font-weight: 400;
            margin: 0;
        }

        button {
            padding: 16px 32px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: #888;
            font-size: 14px;
            font-weight: 300;
        }

        .smash-elements {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 2em;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .form-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="smash-elements">⚔️🎯</div>
        <div class="logo-section">
            <div class="game-icon">🎮</div>
            <div class="logo">Smash Bros</div>
            <div class="subtitle">Coaching Academy</div>
        </div>

        <div class="form-toggle">
            <button class="toggle-btn active" id="loginToggle">Login</button>
            <button class="toggle-btn" id="signupToggle">Sign Up</button>
        </div>

        <div class="form-section active" id="loginSection">
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="loginName" name="name" placeholder=" " required>
                    <label for="loginName">Player Name</label>
                </div>

                <div class="form-group">
                    <input type="password" id="loginPassword" name="password" placeholder=" " required>
                    <label for="loginPassword">Secret Code</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="loginHasSwitch" name="hasSwitch">
                    <label for="loginHasSwitch">I own a Nintendo Switch</label>
                </div>

                <div class="form-group">
                    <select id="loginYearLevel" name="yearLevel" required>
                        <option value="" disabled selected></option>
                        <option value="9">9th Grade - Freshman</option>
                        <option value="10">10th Grade - Sophomore</option>
                        <option value="11">11th Grade - Junior</option>
                        <option value="12">12th Grade - Senior</option>
                    </select>
                    <label for="loginYearLevel">School Year</label>
                </div>

                <button type="submit">Enter the Arena</button>
            </form>
        </div>

        <div class="form-section" id="signupSection">
            <form id="signupForm">
                <div class="form-group">
                    <input type="text" id="signupName" name="name" placeholder=" " required>
                    <label for="signupName">Username</label>
                </div>

                <div class="form-group">
                    <input type="password" id="signupPassword" name="password" placeholder=" " required>
                    <label for="signupPassword">Password</label>
                </div>

                <div class="form-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" " required>
                    <label for="confirmPassword">Confirm Password</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="signupHasSwitch" name="hasSwitch">
                    <label for="signupHasSwitch">I have a Nintendo Switch</label>
                </div>

                <div class="form-group">
                    <select id="signupYearLevel" name="yearLevel" required>
                        <option value="" disabled selected></option>
                        <option value="9">9th Grade - Freshman</option>
                        <option value="10">10th Grade - Sophomore</option>
                        <option value="11">11th Grade - Junior</option>
                        <option value="12">12th Grade - Senior</option>
                    </select>
                    <label for="signupYearLevel">School Year</label>
                </div>

                <button type="submit">Create Account</button>
            </form>
        </div>

        <div class="footer-text">
            Ready to level up your game? Let's smash it! 💪
        </div>
    </div>

    <script>
        // Toggle between login and signup forms
        const loginToggle = document.getElementById('loginToggle');
        const signupToggle = document.getElementById('signupToggle');
        const loginSection = document.getElementById('loginSection');
        const signupSection = document.getElementById('signupSection');

        loginToggle.addEventListener('click', function() {
            loginToggle.classList.add('active');
            signupToggle.classList.remove('active');
            loginSection.classList.add('active');
            signupSection.classList.remove('active');
        });

        signupToggle.addEventListener('click', function() {
            signupToggle.classList.add('active');
            loginToggle.classList.remove('active');
            signupSection.classList.add('active');
            loginSection.classList.remove('active');
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('loginName').value;
            const password = document.getElementById('loginPassword').value;
            const hasSwitch = document.getElementById('loginHasSwitch').checked;
            const yearLevel = document.getElementById('loginYearLevel').value;

            // For demonstration purposes, store in localStorage
            const userData = {
                name: name,
                password: password, // Note: In a real app, never store passwords in plain text
                hasSwitch: hasSwitch,
                yearLevel: yearLevel
            };

            localStorage.setItem('userData', JSON.stringify(userData));

            alert(`Welcome back to the arena, ${name}!\n\nYear Level: ${yearLevel}\nNintendo Switch: ${hasSwitch ? 'Yes' : 'No'}\n\nGet ready to smash! 🎮⚔️`);

            // In a real application, you would send this data to a server for authentication
        });

        // Signup form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('signupName').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const hasSwitch = document.getElementById('signupHasSwitch').checked;
            const yearLevel = document.getElementById('signupYearLevel').value;

            // Basic password confirmation check
            if (password !== confirmPassword) {
                alert('Passwords do not match! Please try again.');
                return;
            }

            // Check if user already exists (in a real app, this would be server-side)
            const existingUsers = JSON.parse(localStorage.getItem('users') || '[]');
            const userExists = existingUsers.some(user => user.name === name);

            if (userExists) {
                alert('Username already exists! Please choose a different username.');
                return;
            }

            // Create new user
            const newUser = {
                name: name,
                password: password, // Note: In a real app, hash passwords
                hasSwitch: hasSwitch,
                yearLevel: yearLevel,
                createdAt: new Date().toISOString()
            };

            existingUsers.push(newUser);
            localStorage.setItem('users', JSON.stringify(existingUsers));

            alert(`Welcome to the Smash Bros Coaching Academy, ${name}!\n\nYour account has been created successfully!\n\nYear Level: ${yearLevel}\nNintendo Switch: ${hasSwitch ? 'Yes' : 'No'}\n\nTime to start your training! 🏆`);

            // Switch back to login form
            loginToggle.click();
        });
    </script>
</body>
</html>
